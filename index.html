<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation Terms Archive | Research Design Studio</title>
    <link rel="stylesheet" href="./style.css" type="text/css" media="all">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="icon" href="./Cancellation-Terms_Favicon.png" type="image/png">
</head>

<body>

    <header>
      <h1 id="site-title">CANCELLATION TERMS</h1>
      <p id="site-desc">Visualizing the 'evaporating time' hidden behind dark patterns.</p>
    </header>

    <section class="about">
      <p id="about-text">An inquiry into the legitimacy of readability in subscription economies.</p>
    </section>

    <section class="works">
      <div id="grid">
        </div>
    </section>

    <script>
      const SPREADSHEET_ID = "1VzerbOerqPiRTUy)7YSOhHmLmkvMyhdFJ77gH2Xyqeg"; // 본인의 ID 확인

      const KEYS = {
        serviceName:      "Service Name",
        mediaType:        "Media Type",
        ownershipType:    "Ownership Type",
        category:         "Category",
        launchDate:       "Launch Date",
        region:           "Region",
        targetAudience:   "Target Audience",
        marketShare:      "Market Share",
        billingCycle:     "Billing Cycle",
        pricing:          "Pricing (Monthly)",
        cancellationFeatures: "Cancellation Features",
        difficulty:       "Difficulty",
        fullTerms:        "Full Terms",
        sourceUrl:        "Source URL",
        fontFamily:       "Font Family",
        fontSize:         "Font Size",
        leading:          "Leading",
        tracking:         "Tracking",
        backgroundColor:  "Background Color",
        textColor:        "Text Color",
        notes:            "Notes"
      };

      const CSV_URL = `https://docs.google.com/spreadsheets/d/1VzerbOerqPiRTUyM7YSOhHmLmkvMyhdFJ77gH2Xyqeg/export?format=csv`;

      function parseCSV(text) {
        const lines = text.trim().split("\n");
        const headers = splitCSVLine(lines[0]);
        return lines.slice(1).map((line) => {
          const values = splitCSVLine(line);
          const obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (values[i] || "").trim();
          });
          return obj;
        });
      }

      function splitCSVLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') inQuotes = !inQuotes;
          else if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
          } else {
            current += ch;
          }
        }
        result.push(current);
        return result;
      }

      fetch(CSV_URL)
        .then((res) => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then((text) => {
          const rows = parseCSV(text);
          const grid = document.getElementById("grid");
          grid.innerHTML = ""; 

          rows.forEach((row) => {
            // 'Service Name' 컬럼에 값이 없으면 카드를 만들지 않음
            if (!row[KEYS.serviceName]) return;

            const card = document.createElement("div");
            card.className = "card";
            
            // 시트에서 가져온 디자인 수치 적용
            const previewStyle = `
              background-color: ${row[KEYS.backgroundColor] || '#ffffff'}; 
              color: ${row[KEYS.textColor] || '#000000'};
            `;

            // 카드 내부 구조: 한 서비스의 모든 정보가 이 안에 담김
            card.innerHTML = `
              <div class="card-preview" style="${previewStyle}">
                <span style="font-size: ${row[KEYS.fontSize]}pt; line-height: ${row[KEYS.leading]}; font-family: ${row[KEYS.fontFamily]};">
                  ${row[KEYS.serviceName]} Terms
                </span>
              </div>
              <div class="card-body">
                <div class="card-header">
                  <span class="category">${row[KEYS.category]}</span>
                  <span class="difficulty ${row[KEYS.difficulty]}">${row[KEYS.difficulty]}</span>
                </div>
                <h2 class="service-name">${row[KEYS.serviceName]}</h2>
                <p class="features">${row[KEYS.cancellationFeatures]}</p>
                <div class="specs">
                  <span>Size<strong>${row[KEYS.fontSize]}pt</strong></span>
                  <span>Leading<strong>${row[KEYS.leading]}</strong></span>
                  <span>Color<strong>${row[KEYS.textColor]}</strong></span>
                </div>
              </div>
            `;

            grid.appendChild(card);
          });
        })
        .catch((err) => {
          console.error("Error:", err);
          document.getElementById("grid").innerHTML = `<p style="color:red; padding:2rem;">데이터 로드 실패: 시트의 헤더 영문명이 코드와 일치하는지 확인하세요.</p>`;
        });
    </script>
</body>
</html>
