<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Column | Evidence Dossier</title>
    <link rel="stylesheet" href="./style-archive-column.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
</head>
<body class="archive-body">

    <div id="archive-wrapper">
        <aside class="column section-index">
            <header class="column-header">
                <p class="guide-instruction">조사할 브랜드명을 선택하세요.</p>
            </header>
            <nav id="brand-list" class="scroll-area">
                <div class="loading-status">DATA LOADING...</div>
            </nav>
        </aside>

        <section class="column section-source">
            <header class="column-header">
                <p class="guide-instruction">약관 조항을 읽어 내려가며 특정 문구 위에 마우스를 머무르세요.</p>
            </header>
            <article id="terms-display" class="scroll-area">
                <div class="placeholder-text">브랜드를 선택하면 해당 브랜드의 해지약관이 보입니다.</div>
            </article>
        </section>

        <section class="column section-extracted">
            <header class="column-header">
                <p class="guide-instruction">빨간색 조항은 소비자 독소 조항을,<br> 민트색 조항은 기업 면책 조항을 의미합니다.</p>
            </header>
            <div id="archive-stage" class="stage-area"></div>
            
            <footer class="column-footer">
                <button id="finish-btn" onclick="finishArchive()">CLOSE CASE AND RESET</button>
            </footer>
        </section>
    </div>

    <script>
        const sheetID = "1TdIOfMJgPWbPxAEVm7JIHlTYO_gbg9Cr2-CVu8UI8HQ";
        const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        let archiveData = [];
        let zIndexCounter = 100;
        let collectedStrictWords = [];

        function initArchive() {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: (results) => {
                    archiveData = results.data.sort((a, b) => b.Difficulty_Level - a.Difficulty_Level);
                    renderBrandList();
                }
            });
        }

        function renderBrandList() {
            const listContainer = document.getElementById('brand-list');
            listContainer.innerHTML = '';

            archiveData.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'brand-item';
                btn.innerText = item.Brand;
                btn.onclick = () => loadTerms(item);
                listContainer.appendChild(btn);
            });
        }

        function loadTerms(data) {
            const display = document.getElementById('terms-display');
            let text = data.Terms_Source.replace(/\n/g, '<br>');

            if(data.Strict_Keywords) {
                const strict = data.Strict_Keywords.split(',').map(k => k.trim());
                strict.forEach(k => {
                    if(!k) return;
                    const regex = new RegExp(`(${k})`, 'g');
                    text = text.replace(regex, `<span class="keyword-strict" onmouseover="extractWord(this, 'strict')">$1</span>`);
                });
            }

            if(data.Flexible_Keywords) {
                const flexible = data.Flexible_Keywords.split(',').map(k => k.trim());
                flexible.forEach(k => {
                    if(!k) return;
                    const regex = new RegExp(`(${k})`, 'g');
                    text = text.replace(regex, `<span class="keyword-flexible" onmouseover="extractWord(this, 'flexible')">$1</span>`);
                });
            }

            display.innerHTML = text;
            
            document.querySelectorAll('.brand-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === data.Brand) el.classList.add('active');
            });
        }

        function extractWord(element, type) {
            if (element.classList.contains('extracted')) return;
            element.classList.add('extracted');

            const stage = document.getElementById('archive-stage');
            const stageRect = stage.getBoundingClientRect();
            const originRect = element.getBoundingClientRect();    

            const clone = document.createElement('div');
            clone.className = `archived-item ${type}`;
            clone.innerText = element.innerText;

            // 초기 위치 (절대 좌표 기반 계산)
            clone.style.left = `${originRect.left - stageRect.left}px`;
            clone.style.top = `${originRect.top - stageRect.top}px`;
            clone.style.zIndex = zIndexCounter++;
            stage.appendChild(clone);
            
            requestAnimationFrame(() => {
                clone.classList.add('moving');
                const padding = 40;
                const targetX = padding + Math.random() * (stageRect.width - clone.offsetWidth - padding * 2);
                const targetY = padding + Math.random() * (stageRect.height - clone.offsetHeight - padding * 2);

                clone.style.left = `${targetX}px`;
                clone.style.top = `${targetY}px`;
                
                if (type === 'flexible') {
                    setTimeout(() => {
                        clone.classList.add('evaporate');
                        setTimeout(() => clone.remove(), 2000);
                    }, 3000);
                }
            });

            if (type === 'strict') {
                collectedStrictWords.push(element.innerText); // 단어 수집
            }
        }

        function finishArchive() {
            if (collectedStrictWords.length === 0) {
                alert("아직 수집된 독소 조항이 없습니다.");
                return;
            }
            const uniqueWords = [...new Set(collectedStrictWords)];
            localStorage.setItem('strictWords', JSON.stringify(uniqueWords));
            // 부모창(index.html)에서 엔딩 섹션을 보여주도록 메시지 전송 혹은 직접 이동
            window.location.href = 'ending.html'; 
        }

        window.onload = initArchive;
    </script>
</body>
</html>
