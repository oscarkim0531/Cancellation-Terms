<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Trace System | Interaction</title>
    <link rel="stylesheet" href="./style-trace-system.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-storage-compat.js"></script>
</head>
<body>
    <div id="interaction-canvas">
        <div id="background-instruction">'해지하기' 버튼을 추적하세요.</div>

        <div id="interaction-shield"></div>

        <div class="system-declaration">
            귀하는 본 고지 사항을 모두 읽었으며, 해지 시 발생하는 모든 불이익을 본인의 책임으로 수용합니다.
        </div>

        <button id="evasive-button">해지하기</button>

        <svg id="line-canvas"></svg>
        
        <div id="word-container"></div>

        <div id="system-data-report">
            STATUS: RECORDING...<br>
            TOTAL DISTANCE: <span id="val-distance">0</span> PX<br>
            BLOCKS CREATED: <span id="val-blocks">0</span><br>
            ELAPSED TIME: <span id="val-time">0.0</span>S
        </div>

        <div id="capture-watermark">
            © 2026 Cancellation Terms Archive — Oscar Kim<br>
            All traces of resistance are recorded.
        </div>
        
    </div>

    <div id="custom-modal" class="modal-hidden">
        <div class="modal-content">
            <p>정말 해지하시겠습니까?</p>
            <button id="modal-confirm-btn">해지하기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYxHPcUery0vbVzn7DutlyOhHdr7R-Z6Y",
            authDomain: "cancellationterms-oscarkim.firebaseapp.com",
            projectId: "cancellationterms-oscarkim",
            storageBucket: "cancellationterms-oscarkim.firebasestorage.app",
            messagingSenderId: "361219148645",
            appId: "1:361219148645:web:730d93edf0ec4473c5af8c"
        };

        // Firebase 초기화 (호환 모드)
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const createInterval = 400;
        const initialRadius = 200;
        const rotationSpeed = 0.03;
        const phaseDuration = 6000;
        const lineOpacity = 0.6;
        
        const chosenSentences = [
            "귀하가 본 서비스를 해지하더라도 이미 결제된 요금은 일절 환불되지 않습니다.",
            "중도 해지 시 모든 할인 혜택은 위약금으로 소급 청구될 수 있습니다.",
            "해지 즉시 모든 데이터는 영구적으로 삭제되며 복구는 불가능합니다.",
            "무료 체험 종료 후 별도의 통지 없이 유료로 자동 전환됩니다.",
            "본 약관 동의는 향후 발생하는 모든 분쟁에 대한 이의 제기 포기를 의미합니다.",
            "회사는 경영상의 사유로 서비스 내용을 변경할 수 있으며, 이는 이용자의 해지 사유가 되지 않습니다.",
            "해지 버튼을 누르기 전, 귀하가 포기하게 되는 혜택들을 다시 한번 상세히 숙지하시기 바랍니다.",
            "정기 결제 해지는 최소 다음 결제일 7일 전까지 완료되어야 하며, 이후 신청은 다음 달에 반영됩니다.",
            "일부 프로모션 상품의 경우 시스템 구조상 온라인 해지가 불가능하며 고객센터 연결이 필요합니다.",
            "귀하는 본 고지 사항을 모두 읽었으며, 해지 시 발생하는 모든 불이익을 본인의 책임으로 수용합니다."
        ];

        let wordsBuffer = [];
        let linesBuffer = [];
        let sentenceIndex = 0;
        let wordIndexInSentence = 0;
        let totalMoveDist = 0;
        
        const container = document.getElementById('word-container');
        const button = document.getElementById('evasive-button');
        const lineCanvas = document.getElementById('line-canvas');
        const lerpFactor = 0.1;
        const minDistance = 15;
        const gridSize = 40;
        const maxProgressionDist = 5000;
    
        
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let buttonAngle = Math.random() * Math.PI * 2; 
        let currentRadius = initialRadius;
        let isClickable = false;
        let isSystemStarted = false;
        let creationTimer = null;
        let currentBtnX = window.innerWidth / 2;
        let currentBtnY = window.innerHeight / 2;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let lastWordX = null;
        let lastWordY = null;
        let totalDistance = 0;
        let blockCount = 0;
        let startTime = null;
        let elapsedTime = 0;
        let fullTraceText = "";
        let isTraceStopped = false;

        window.addEventListener('message', (e) => {
            if (e.data === 'start-trace') {
                currentRadius = initialRadius; 
                isClickable = false;
                button.classList.remove('clickable');
                button.onclick = null;
                
                runTraceSystem();
            }
        });

        window.onload = () => {
            updateButton(); 
        };

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function runTraceSystem() {
            if (isSystemStarted) return;
            isSystemStarted = true;

            const btnWidth = button.offsetWidth;
            const btnHeight = button.offsetHeight;
            currentBtnX = window.innerWidth / 2 - btnWidth / 2;
            currentBtnY = window.innerHeight / 2 - btnHeight / 2;

            button.style.left = `${currentBtnX}px`;
            button.style.top = `${currentBtnY}px`;

            fullTraceText = "";
            localStorage.removeItem('userTraceData');
            startTime = null;

            setTimeout(() => {
                creationTimer = setInterval(() => {
                    createWordAndLine();
                }, createInterval);

                const shrinkEffect = setInterval(() => {
                    if (currentRadius > 5) {
                        currentRadius -= 2;
                    } else {
                        clearInterval(shrinkEffect);
                        isClickable = true;
                        button.classList.add('clickable');
                        
                        const shield = document.getElementById('interaction-shield');
                        if (shield) shield.style.display = 'none'; 

                        button.onclick = () => {
                            isTraceStopped = true;

                            if (creationTimer) {
                                clearInterval(creationTimer);
                                creationTimer = null;
                            }
                            const reportStatus = document.getElementById('system-data-report');
                            if (reportStatus) {
                                reportStatus.innerHTML = reportStatus.innerHTML.replace("RECORDING...", "FINALIZED");
                            }
                            captureAndDownload();
                            setTimeout(() => {
                                const modal = document.getElementById('custom-modal');
                                modal.classList.remove('modal-hidden');
                                modal.classList.add('modal-visible');
                            }, 100);
                        };
                    }
                }, 100);
            }, 500);
        }

        function createWordAndLine() {
            if (isTraceStopped) return;

            if (!startTime) startTime = Date.now();

            const dist = Math.sqrt(Math.pow(mouseX - lastMouseX, 2) + Math.pow(mouseY - lastMouseY, 2));
            
            if (dist < minDistance) return;

            const snappedX = Math.round(mouseX / gridSize) * gridSize;
            const snappedY = Math.round(mouseY / gridSize) * gridSize;

            totalMoveDist += dist;
            let progression = Math.min(totalMoveDist / maxProgressionDist, 1);
            
            const currentOpacity = 0.1 + (progression * 0.9);
            const currentStrokeWidth = 0.5 + (progression * 2.5);
            const currentFontSize = 0.8 + (progression * 0.4);

            totalDistance += Math.round(dist);
            blockCount++;
            elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);

            document.getElementById('val-distance').innerText = totalDistance.toLocaleString();
            document.getElementById('val-blocks').innerText = blockCount;
            document.getElementById('val-time').innerText = elapsedTime;

            lastMouseX = mouseX;
            lastMouseY = mouseY;

            const currentFullSentence = chosenSentences[sentenceIndex];
            const wordsInSentence = currentFullSentence.split(' ');
            const currentWord = wordsInSentence[wordIndexInSentence];

            const span = document.createElement('span');
            span.className = 'word-data';
            span.innerText = currentWord;
            span.style.left = `${snappedX}px`;
            span.style.top = `${snappedY}px`;
            span.style.opacity = currentOpacity;
            span.style.fontSize = `${currentFontSize}rem`;
            container.appendChild(span);

            if (lastWordX !== null && lastWordY !== null) {
                const pathLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
                pathLine.setAttribute("x1", lastWordX);
                pathLine.setAttribute("y1", lastWordY);
                pathLine.setAttribute("x2", snappedX);
                pathLine.setAttribute("y2", snappedY);
                pathLine.setAttribute("stroke", "#ff0000");
                pathLine.setAttribute("stroke-width", currentStrokeWidth);
                pathLine.setAttribute("opacity", currentOpacity);
                lineCanvas.appendChild(pathLine);
            }

            lastWordX = snappedX; 
            lastWordY = snappedY;

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", snappedX);
            line.setAttribute("y1", snappedY);
            line.setAttribute("stroke", "#33ff33");
            line.setAttribute("stroke-width", currentStrokeWidth * 0.3); 
            line.setAttribute("opacity", currentOpacity * 0.5);
            lineCanvas.appendChild(line);            

            linesBuffer.push({
                element: line,
                originX: snappedX,
                originY: snappedY
            });

            fullTraceText += currentWord + " "; 
            if (wordIndexInSentence === wordsInSentence.length - 1) {
                fullTraceText += "\n\n";
            }
            localStorage.setItem('userTraceData', fullTraceText);

            wordIndexInSentence++;
            if (wordIndexInSentence >= wordsInSentence.length) {
                wordIndexInSentence = 0;
                sentenceIndex = (sentenceIndex + 1) % chosenSentences.length;
            }
        }

        function updateButton() {
            if (isTraceStopped) return;
            buttonAngle += rotationSpeed;

            let targetX = mouseX + Math.cos(buttonAngle) * currentRadius;
            let targetY = mouseY + Math.sin(buttonAngle) * currentRadius;

            const margin = 80;
            const btnWidth = button.offsetWidth;
            const btnHeight = button.offsetHeight;

            targetX = Math.max(margin, Math.min(targetX, window.innerWidth - btnWidth - margin));
            targetY = Math.max(margin, Math.min(targetY, window.innerHeight - btnHeight - margin));

            currentBtnX += (targetX - currentBtnX) * lerpFactor;
            currentBtnY += (targetY - currentBtnY) * lerpFactor;

            button.style.left = `${currentBtnX}px`;
            button.style.top = `${currentBtnY}px`;

            const btnCenterX = currentBtnX + btnWidth / 2;
            const btnCenterY = currentBtnY + btnHeight / 2;

            linesBuffer.forEach(lineObj => {
                lineObj.element.setAttribute("x2", btnCenterX);
                lineObj.element.setAttribute("y2", btnCenterY);
            });

            requestAnimationFrame(updateButton);
        }

        function captureAndDownload() {
            
            const target = document.getElementById('interaction-canvas');
            const watermark = document.getElementById('capture-watermark');
            const systemData = document.getElementById('system-data-report');

            systemData.style.color = "rgba(4, 255, 0, 0.9)";
            watermark.style.color = "rgba(4, 255, 0, 0.9)";

            const now = new Date();
            watermark.innerHTML = `© 2026 Cancellation Terms Archive — Oscar Kim<br>
                                    GENERATED ON: ${now.toLocaleString()}<br>
                                    ALL TRACES OF RESISTANCE ARE RECORDED.`;

            html2canvas(target, {
                backgroundColor: "#000000",
                scale: 1,
                useCORS: true,
                logging: false,
                allowTaint: true,
                width: window.innerWidth,
                height: window.innerHeight,
                scrollX: 0,
                scrollY: -window.pageYOffset,
                onclone: (clonedDoc) => {
                    const clonedTarget = clonedDoc.getElementById('interaction-canvas');
                    clonedTarget.style.width = `${window.innerWidth}px`;
                    clonedTarget.style.height = `${window.innerHeight}px`;
                    
                    const clonedWords = clonedDoc.querySelectorAll('.word-data');
                    clonedWords.forEach(word => {
                        word.style.opacity = '1';
                    });
                }
            }).then(canvas => {
                const finalCanvas = document.createElement('canvas');
                const fctx = finalCanvas.getContext('2d');
                finalCanvas.width = 1920;
                finalCanvas.height = 960;
                fctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, 1920, 960);
                
                const image = canvas.toDataURL("image/png");
                
                const link = document.createElement('a');
                const fileName = `Cancellation_Trace_${now.getTime()}.png`;

                link.href = image;
                link.download = fileName;
                link.click();

                canvas.toBlob((blob) => {
                    const fileRef = storage.ref().child(`traces/${fileName}`);
                    
                    console.log("Firebase 업로드 중...");
                    fileRef.put(blob).then(() => {
                        console.log("Firebase 업로드 완료!");
                    }).catch(err => {
                        console.error("업로드 실패:", err);
                    });
                }, 'image/png');

                systemData.style.color = "rgba(4, 255, 0, 0.2)";
                watermark.style.color = "rgba(4, 255, 0, 0.2)";
            });
        }

        window.onload = () => {
            updateButton();

            setTimeout(() => {
                const shrinkEffect = setInterval(() => {
                    if (currentRadius > 5) {
                        currentRadius -= 2;
                    } else {
                        clearInterval(shrinkEffect);
                        isClickable = true;
                        button.classList.add('clickable');
                        button.onclick = () => {
                            captureAndDownload();

                            setTimeout(() => {
                                const modal = document.getElementById('custom-modal');
                                modal.classList.remove('modal-hidden');
                                modal.classList.add('modal-visible');
                            }, 100);
                        };
                    }
                }, 100);
            }, phaseDuration);
        };

        document.getElementById('modal-confirm-btn').onclick = () => {
            window.parent.postMessage('go-to-text', '*');
        };
        
    </script>
</body>
</html>
