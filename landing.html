<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancellation Terms | Initialization</title>
    <link rel="stylesheet" href="./style-landing.css" type="text/css" media="all">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
</head>
<body>

    <div id="scroll-wrapper">
        <div id="canvas-container">
            <canvas id="pixel-canvas"></canvas>
            
            <div id="scroll-guide">
                <span class="guide-text">SCROLL TO EXTRACT TERMS</span>
                <div class="guide-line"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixel-canvas');
        const ctx = canvas.getContext('2d');
        const scrollWrapper = document.getElementById('scroll-wrapper');
        const guide = document.getElementById('scroll-guide');

        let particles = [];
        let width, height;
        let scrollTop = 0;
        let progress = 0;
        let isCompleted = false;
        const text = "CANCELLATION TERMS";
        const speed = 0.0005;
        
        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            document.fonts.load(`900 120px "Pretendard"`).then(() => {
                createParticles();
            });
        }

        function createParticles() {
            particles = [];
            ctx.clearRect(0, 0, width, height);

            let dynamicFontSize = width * 0.12;
            if (dynamicFontSize > 150) dynamicFontSize = 150;
            if (dynamicFontSize < 60) dynamicFontSize = 60;
            
            ctx.fillStyle = "white";
            const fontSize = Math.min(width * 0.12, 120);
            ctx.font = `900 ${fontSize}px 'Pretendard'`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, width / 2, height / 2);

            const imageData = ctx.getImageData(0, 0, width, height).data;
            ctx.clearRect(0, 0, width, height);

            const gap = width < 768 ? 3 : 4;

            for (let y = 0; y < height; y += gap) {
                for (let x = 0; x < width; x += gap) {
                    const index = (y * width + x) * 4;
                    if (imageData[index + 3] > 128) {
                        particles.push({
                            targetX: x,
                            targetY: y,
                            currentX: Math.random() * width,
                            currentY: Math.random() * height,
                            size: Math.random() * 2 + 1,
                            speed: Math.random() * 0.05 + 0.02
                        });
                    }
                }
            }
        }

        window.addEventListener('resize', () => {
            init();
        });

        window.addEventListener('wheel', (e) => {
            if (isCompleted) return; 

            progress += e.deltaY * speed;
            progress = Math.max(0, Math.min(progress, 1)); 
            
            if (progress >= 0.99 && !isCompleted) {
                isCompleted = true;
                
                setTimeout(() => {
                    console.log("Archive Initialization Complete. Transitioning...");
                    window.parent.postMessage('landing-finished', '*');
                }, 3000);
            }
        }, { passive: true });

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const maxScroll = scrollWrapper.offsetHeight - window.innerHeight;
            const scrollFraction = Math.min(scrollTop / maxScroll, 1);

            guide.style.opacity = 1 - (scrollFraction * 4);

            particles.forEach(p => {
                const dx = p.targetX - p.currentX;
                const dy = p.targetY - p.currentY;
                
                const x = p.currentX + dx * progress;
                const y = p.currentY + dy * progress;

                ctx.fillStyle = `rgba(255, 255, 255, ${0.4 + scrollFraction * 0.6})`;
                ctx.fillRect(x, y, p.size, p.size + 0.2);
            });

            if (scrollFraction >= 0.99) {
                if (!window.isTransitioning) {
                    window.isTransitioning = true;
                    console.log("Transition to Guide System Initiated");
                    window.parent.postMessage('landing-finished', '*');
                }
            } else {
                window.isTransitioning = false;
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
