<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Verdict | Statement of Consent</title>
    <link rel="stylesheet" href="./style-text.css">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
</head>
<body>
    <div id="text-system-wrapper">
        <div id="scrolling-message-container">
            <div class="message-item" id="msg-1">
                귀하는 <span id="current-time-display"></span>에 <br>상기 해지 약관을 모두 읽고 동의하셨습니다.
            </div>
            <div class="message-item" id="msg-2">
                당신이 버튼을 쫓는 데 몰입하는 동안, <br>무시된 약관들은 모두 승인 처리되었습니다.
            </div>
            <div class="message-item" id="msg-3">
                당신은 정말 해지 약관을 인지하고 동의하신 건가요, <br>아니면 그저 버튼만 쫓았던 건가요?
            </div>
        </div>

        <div id="final-choice-area" class="hidden">
            <button id="btn-recall">해지 약관 복기하기</button>
            <button id="btn-go-archive">아카이브 보기</button>
        </div>

        <div id="recall-overlay" class="hidden">
            <div class="recall-content">
                <h2>CANCELLATION TERMS</h2>
                <hr>
                <p id="trace-sentence-result"></p>
                <hr>
                <button id="btn-back-to-choice">돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const now = new Date();
            const timeString = `${now.getFullYear()}년 ${String(now.getMonth() + 1).padStart(2, '0')}월 ${String(now.getDate()).padStart(2, '0')}일 ` +
                               `${String(now.getHours()).padStart(2, '0')}시 ${String(now.getMinutes()).padStart(2, '0')}분 ${String(now.getSeconds()).padStart(2, '0')}초`;
            document.getElementById('current-time-display').innerText = timeString;

            const savedTraces = localStorage.getItem('userTraceData');
            const traceResultElement = document.getElementById('trace-sentence-result');

            if (savedTraces && savedTraces.trim().length > 0) {
                traceResultElement.innerText = savedTraces;
                traceResultElement.style.whiteSpace = "pre-wrap"; 
            } else {
                traceResultElement.innerText = "기록된 약관 데이터가 존재하지 않습니다.";
            }

            startMessageSequence();
        };

        function startMessageSequence() {
            const messages = document.querySelectorAll('.message-item');
            let delay = 1000;

            messages.forEach((msg, index) => {
                setTimeout(() => {
                    msg.classList.add('active');
                }, delay);
                
                delay += 5500;

                if (index === messages.length - 1) {
                    setTimeout(() => {
                        document.getElementById('final-choice-area').classList.remove('hidden');
                        document.getElementById('final-choice-area').classList.add('fade-in');
                    }, delay - 1000);
                }
            });
        }

        document.getElementById('btn-recall').onclick = () => {
            document.getElementById('recall-overlay').classList.remove('hidden');
        };

        document.getElementById('btn-back-to-choice').onclick = () => {
            document.getElementById('recall-overlay').classList.add('hidden');
        };

        document.getElementById('btn-go-archive').onclick = () => {
            window.parent.postMessage('go-to-archive', '*');
        };
    </script>
</body>
</html>
